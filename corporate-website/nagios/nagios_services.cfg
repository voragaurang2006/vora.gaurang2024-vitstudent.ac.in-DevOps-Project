# =========================================================================
# Nagios Host and Service Monitoring Configurations
# =========================================================================

# Host definition to monitor the Kubernetes Worker Node hosting the Website
define host {
    use                     linux-server
    host_name               corporate-website-host
    alias                   Kubernetes Node hosting Corporate Website
    address                 192.168.49.2
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# Service definition to monitor PING (Host availability)
define service {
    use                     generic-service
    host_name               corporate-website-host
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
}

# Service definition to monitor HTTP website on Kubernetes NodePort (30080)
define service {
    use                     generic-service
    host_name               corporate-website-host
    service_description     HTTP Website Availability
    check_command           check_http!-p 30080 -u /
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# Service definition to monitor HTTP API health endpoint (/api/health)
define service {
    use                     generic-service
    host_name               corporate-website-host
    service_description     API Health Endpoint
    check_command           check_http!-p 30080 -u /api/health -s "UP"
    max_check_attempts      3
    check_interval          5
    retry_interval          1
}
